name: Infra Deploy

on:
  pull_request:
  push:
    branches: [main]

# Prevent concurrent deploys — infra changes must be applied serially.
concurrency:
  group: infra-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Config
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Enforce infra contract
        run: bash scripts/check-contract.sh

      - name: Guard against incorrect Docker CLI usage
        run: bash scripts/validate-docker-cli.sh

      - name: Validate secrets configuration
        run: bash scripts/validate-secrets.sh

      - name: Validate path setup
        run: bash scripts/validate-paths.sh

      - name: Validate nginx configs
        run: bash scripts/validate-nginx-configs.sh

      - name: Run comprehensive system validation
        run: bash scripts/validate-system.sh

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install yamllint
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck gettext-base -qq

      - name: Validate required environment variables
        run: |
          echo "Validating .env.monitoring.example contains all required variables..."
          REQUIRED_VARS=("API_HOSTNAME" "GRAFANA_ADMIN_PASSWORD" "METRICS_SCRAPE_TOKEN" "ALERTMANAGER_SLACK_WEBHOOK")
          MISSING_VARS=()

          for var in "${REQUIRED_VARS[@]}"; do
            if ! grep -q "^${var}=" .env.monitoring.example; then
              MISSING_VARS+=("${var}")
            fi
          done

          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "ERROR: Missing required variables in .env.monitoring.example:"
            printf '  - %s\n' "${MISSING_VARS[@]}"
            exit 1
          fi

          echo "All required variables present in .env.monitoring.example"

      - name: Prepare monitoring env and rendered config
        run: |
          cp .env.monitoring.example .env.monitoring
          sed -i 's/^API_HOSTNAME=.*/API_HOSTNAME=api.test.local/' .env.monitoring
          sed -i 's/^GRAFANA_ADMIN_PASSWORD=.*/GRAFANA_ADMIN_PASSWORD=ci-grafana-password/' .env.monitoring
          sed -i 's/^METRICS_SCRAPE_TOKEN=.*/METRICS_SCRAPE_TOKEN=ci-metrics-token/' .env.monitoring
          sed -i 's#^ALERTMANAGER_SLACK_WEBHOOK=.*#ALERTMANAGER_SLACK_WEBHOOK=https://hooks.slack.com/services/T00000000/B00000000/CIWEBHOOK#' .env.monitoring

          # Validate all required variables are set
          set -a
          source .env.monitoring
          set +a

          : "${API_HOSTNAME:?API_HOSTNAME is required}"
          : "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}"
          : "${METRICS_SCRAPE_TOKEN:?METRICS_SCRAPE_TOKEN is required}"
          : "${ALERTMANAGER_SLACK_WEBHOOK:?ALERTMANAGER_SLACK_WEBHOOK is required}"

          bash scripts/render-prometheus.sh
          bash scripts/render-alertmanager.sh

      - name: Lint YAML
        run: |
          yamllint -d relaxed \
            docker-compose.nginx.yml \
            docker-compose.redis.yml \
            docker-compose.monitoring.yml \
            prometheus/prometheus.yml \
            prometheus/alerts.yml \
            alertmanager/alertmanager.yml \
            loki/loki-config.yaml \
            promtail/promtail.yml \
            blackbox/blackbox.yml \
            grafana/provisioning/dashboards/dashboard.yml \
            grafana/provisioning/datasources/prometheus.yml

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.nginx.yml config --quiet
          docker compose -f docker-compose.redis.yml config --quiet
          docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml config --quiet

      - name: Validate Prometheus and Alertmanager configs
        run: |
          docker run --rm -v "${PWD}:/workspace" -w /workspace --entrypoint promtool prom/prometheus:v2.52.0 \
            check config prometheus/prometheus.rendered.yml
          docker run --rm -v "${PWD}:/workspace" -w /workspace --entrypoint promtool prom/prometheus:v2.52.0 \
            check rules prometheus/alerts.yml
          docker run --rm -v "${PWD}:/workspace" -w /workspace --entrypoint amtool prom/alertmanager:v0.27.0 \
            check-config alertmanager/alertmanager.rendered.yml

      - name: Shellcheck scripts
        run: |
          shellcheck -S warning \
            scripts/lib-http.sh \
            scripts/bootstrap.sh \
            scripts/nginx-sync.sh \
            scripts/check-contract.sh \
            scripts/monitoring-sync.sh \
            scripts/render-alertmanager.sh \
            scripts/render-prometheus.sh \
            scripts/verify-alertmanager.sh \
            scripts/validate-nginx-configs.sh \
            scripts/validate-paths.sh \
            scripts/validate-system.sh \
            scripts/validate-docker-cli.sh \
            scripts/validate-secrets.sh

  smoke-core:
    name: Smoke Core Infra
    runs-on: ubuntu-24.04
    needs: [validate]
    env:
      API_HOSTNAME: api.test.local

    steps:
      - uses: actions/checkout@v4

      - name: Verify script versions
        run: |
          echo "=== nginx-sync.sh version check ==="
          head -30 scripts/nginx-sync.sh | grep -E "(set -|FINAL MODE)" || echo "Checking first 30 lines..."
          echo ""
          echo "=== Checking for exit 0 logic ==="
          tail -20 scripts/nginx-sync.sh

      - name: Prepare host paths and TLS material
        run: |
          sudo mkdir -p /etc/ssl/api /var/www/certbot /var/log/nginx /var/lib/fieldtrack
          sudo chown -R $USER:$USER /var/lib/fieldtrack
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/origin.key \
            -out /tmp/origin.crt \
            -days 1 \
            -subj "/CN=api.test.local"
          sudo cp /tmp/origin.crt /etc/ssl/api/origin.crt
          sudo cp /tmp/origin.key /etc/ssl/api/origin.key

      - name: Ensure shared network
        run: docker network create api_network || true

      - name: Bootstrap core infra
        env:
          API_HOSTNAME: api.test.local
          INFRA_ROOT: ${{ github.workspace }}
          LOG_DIR: /tmp/fieldtrack/log
          STATE_DIR: /tmp/fieldtrack/state
        run: bash scripts/bootstrap.sh

      - name: Verify Redis readiness
        run: docker exec redis redis-cli ping | grep -q '^PONG$'

      - name: Verify Redis reachable on api_network
        run: docker run --rm --network api_network redis:7-alpine redis-cli -h redis ping | grep -q '^PONG$'

      - name: Verify nginx maintenance mode before API
        run: |
          # shellcheck source=scripts/lib-http.sh
          . scripts/lib-http.sh
          # Verify nginx is alive (HTTPS /infra/health must return 200)
          _code="$(curl_https_code "https://${API_HOSTNAME}/infra/health")"
          [ "${_code}" = "200" ] || { echo "ERROR: /infra/health returned ${_code}"; exit 1; }
          # Verify /health returns 503 in maintenance mode (no backend)
          _code="$(curl_https_code "https://${API_HOSTNAME}/health")"
          [ "${_code}" = "503" ] || { echo "ERROR: /health returned ${_code} (expected 503)"; exit 1; }
          # Verify root returns 503
          _code="$(curl_https_code "https://${API_HOSTNAME}/")"
          [ "${_code}" = "503" ] || { echo "ERROR: / returned ${_code} (expected 503)"; exit 1; }

      - name: Start mock API backend (container name api-green)
        run: |
          cat <<'EOF' >/tmp/mock-api.conf
          server {
              listen 3000;

              location = /health {
                  add_header Content-Type application/json;
                  return 200 '{"status":"ok"}';
              }

              location = /ready {
                  add_header Content-Type application/json;
                  return 200 '{"status":"ready"}';
              }

              location / {
                  add_header Content-Type application/json;
                  return 200 '{"service":"mock-api"}';
              }
          }
          EOF

          # Container MUST be named api-green (or api-blue) so nginx-sync
          # auto-discovers it. The sync script ONLY looks for api-green/api-blue;
          # any other name is ignored and forces maintenance mode.
          docker run -d --name api-green --network api_network \
            -v /tmp/mock-api.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:1.25-alpine >/dev/null

      - name: Sync nginx to healthy backend
        env:
          API_HOSTNAME: api.test.local
          INFRA_ROOT: ${{ github.workspace }}
          LOG_DIR: /tmp/fieldtrack/log
          STATE_DIR: /tmp/fieldtrack/state
        run: bash scripts/nginx-sync.sh

      - name: Verify routed API health
        run: |
          # shellcheck source=scripts/lib-http.sh
          . scripts/lib-http.sh
          # Verify nginx is alive
          _code="$(curl_https_code "https://${API_HOSTNAME}/infra/health")"
          [ "${_code}" = "200" ] || { echo "ERROR: /infra/health returned ${_code}"; exit 1; }
          # Verify /health proxies to backend and returns 200
          _code="$(curl_https_code "https://${API_HOSTNAME}/health")"
          [ "${_code}" = "200" ] || { echo "ERROR: /health returned ${_code} (expected 200)"; exit 1; }
          # Active mode: body must NOT contain 'maintenance'
          _body="$(curl_https_body "https://${API_HOSTNAME}/health")"
          if printf '%s' "${_body}" | grep -q 'maintenance'; then
            echo "ERROR: Active mode /health contains 'maintenance'! Body: ${_body}"
            exit 1
          fi
          # Verify API content is served
          _body="$(curl_https_body "https://${API_HOSTNAME}/")"
          printf '%s' "${_body}" | grep -q 'mock-api' || { echo "ERROR: / did not return mock-api. Body: ${_body}"; exit 1; }

      - name: Verify api-green resolves on api_network
        run: |
          docker run --rm --network api_network --entrypoint sh nginx:1.25-alpine -eu -c \
            'wget -q --spider --timeout=5 --tries=1 http://api-green:3000/health'

      - name: Stop API and ensure nginx enters maintenance
        env:
          API_HOSTNAME: api.test.local
          INFRA_ROOT: ${{ github.workspace }}
          LOG_DIR: /tmp/fieldtrack/log
          STATE_DIR: /tmp/fieldtrack/state
        run: |
          echo "=== Stopping api-green ==="
          docker stop api-green

          echo "=== Running nginx-sync ==="
          set +e
          bash scripts/nginx-sync.sh
          EXIT_CODE=$?
          echo "=== nginx-sync EXIT CODE: ${EXIT_CODE} ==="

          if [ ${EXIT_CODE} -ne 0 ]; then
            echo "ERROR: nginx-sync failed with exit code ${EXIT_CODE}"
            exit 1
          fi

          echo "=== Checking rendered nginx config ==="
          cat nginx/live/api.conf | head -50

          echo "=== Verifying nginx is running ==="
          docker ps | grep nginx

          # shellcheck source=scripts/lib-http.sh
          . scripts/lib-http.sh

          echo "=== Testing nginx /infra/health endpoint ==="
          _code="$(curl_https_code "https://${API_HOSTNAME}/infra/health")"
          [ "${_code}" = "200" ] || echo "WARN: /infra/health returned ${_code}"

          echo "=== Testing /health endpoint (should be 503 in maintenance) ==="
          HEALTH_CODE="$(curl_https_code "https://${API_HOSTNAME}/health")"
          echo "Health endpoint returned: ${HEALTH_CODE}"

          echo "=== Testing maintenance mode response ==="
          HTTP_CODE="$(curl_https_code "https://${API_HOSTNAME}/")"
          echo "Received HTTP code: ${HTTP_CODE}"

          if [ "${HTTP_CODE}" != "503" ]; then
            echo "ERROR: Expected 503, got ${HTTP_CODE}"
            echo "=== Nginx error log ==="
            docker exec nginx cat /var/log/nginx/api_error.log | tail -20 || echo "Could not read error log"
            exit 1
          fi

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-24.04
    needs: [validate, smoke-core]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        run: |
          echo "Validating required GitHub secrets are configured..."
          MISSING_SECRETS=()

          [ -z "${{ secrets.VPS_HOST }}" ] && MISSING_SECRETS+=("VPS_HOST")
          [ -z "${{ secrets.VPS_USER }}" ] && MISSING_SECRETS+=("VPS_USER")
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && MISSING_SECRETS+=("VPS_SSH_KEY")

          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "ERROR: Missing required GitHub secrets:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            echo ""
            echo "Configure these in: Settings > Secrets and variables > Actions > Repository secrets"
            exit 1
          fi

          echo "All required GitHub secrets are configured"

      - name: Deploy infra via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            # Canonical VPS paths — exported here so every nginx-sync call and
            # the watchdog cron all receive the same values explicitly.
            export LOG_DIR='/var/log/fieldtrack'
            export STATE_DIR='/var/lib/fieldtrack'

            # Completely safe automation
            if [ ! -d /opt/infra/.git ]; then
                echo "[deploy] Cloning infra repository..."
                sudo mkdir -p /opt/infra
                sudo chown -R $USER:$USER /opt/infra
                git clone https://github.com/fieldtrack-tech/infra.git /opt/infra
            fi

            cd /opt/infra
            echo "[deploy] Fetching latest infra config..."
            git fetch origin
            git reset --hard origin/main

            sudo chown -R $USER:$USER /opt/infra

            # Load environment FIRST — bootstrap.sh and nginx-sync.sh both
            # require API_HOSTNAME, which lives in .env.monitoring on VPS.
            # Fail fast here with a clear error rather than inside bootstrap.
            if [ ! -f /opt/infra/.env.monitoring ]; then
              echo "[deploy] ERROR: /opt/infra/.env.monitoring is missing."
              echo "[deploy] This file must be present on the VPS before deploying."
              echo "[deploy] Copy .env.monitoring.example, fill in real values, and place it at /opt/infra/.env.monitoring"
              exit 1
            fi
            set -a
            . /opt/infra/.env.monitoring
            set +a
            : "${API_HOSTNAME:?API_HOSTNAME must be set in /opt/infra/.env.monitoring}"

            # Source shared HTTP probe helpers so validate_state uses the same
            # curl_http_code / curl_https_code / curl_https_body functions as
            # nginx-sync.sh and bootstrap.sh.  Must come after API_HOSTNAME is
            # set (functions guard against empty API_HOSTNAME at call time).
            # shellcheck source=scripts/lib-http.sh
            . /opt/infra/scripts/lib-http.sh

            echo "[deploy] Validating infra completeness..."
            bash scripts/validate-paths.sh || {
              echo "[deploy] ERROR: Infra validation failed"
              exit 1
            }

            echo "[deploy] Running bootstrap to ensure system state..."
            bash scripts/bootstrap.sh || {
              echo "[deploy] ERROR: Bootstrap failed"
              exit 1
            }

            if ! command -v crontab >/dev/null 2>&1; then
              echo "[deploy] ERROR crontab not found; watchdog install is required for runtime failover safety." >&2
              exit 1
            fi
            WATCHDOG_TAG="fieldtrack-nginx-watchdog"
            CRON_LINE="* * * * * LOG_DIR='/var/log/fieldtrack' STATE_DIR='/var/lib/fieldtrack' bash -lc 'cd /opt/infra && set -a && . ./.env.monitoring && set +a && bash scripts/nginx-sync.sh' >> /opt/infra/nginx-sync-watchdog.log 2>&1 # ${WATCHDOG_TAG}"
            (
              crontab -l 2>/dev/null | grep -Fv "${WATCHDOG_TAG}" || true
              printf '%s\n' "${CRON_LINE}"
            ) | crontab -
            echo "[deploy] nginx watchdog cron ensured."

            MONITORING_FAILED=0
            echo "[deploy] Syncing monitoring stack..."
            if ! bash scripts/monitoring-sync.sh; then
              MONITORING_FAILED=1
              echo "[deploy] Monitoring sync failed; continuing with core infra sync."
            fi

            echo "[deploy] Syncing nginx config..."
            bash scripts/nginx-sync.sh

            if [ "${MONITORING_FAILED}" -ne 0 ]; then
              echo "[deploy] WARNING monitoring stack is unhealthy. Core infra changes were still applied."
            fi

            echo "[deploy] Deterministic execution controller waiting for convergence limits..."
            validate_state() {
              for i in $(seq 1 10); do
                 # --- Check 1: nginx config correctness (infra invariant) ---
                 # /infra/health is served by nginx with no backend involvement.
                 # A 200 here proves the correct config is loaded (has the
                 # location block), the correct server block is active, and
                 # there is no redirect loop (--max-redirs 0 treats 301 as
                 # failure, unlike curl -f which silently accepts 3xx).
                 # Retried 3 times to allow for container startup jitter.
                 INFRA_CODE="000"
                 for _r in 1 2 3; do
                   INFRA_CODE="$(curl_http_code "http://127.0.0.1/infra/health")"
                   [ "${INFRA_CODE}" = "200" ] && break
                   sleep 1
                 done

                 # --- Check 2: routing correctness (app health) ---
                 # /health via HTTPS is unambiguous in every mode:
                 #   Active mode  → 200  (proxied to backend)
                 #   Maintenance  → 503  (static return from maintenance config)
                 HEALTH_CODE="$(curl_https_code "https://${API_HOSTNAME}/health")"
                 HEALTH_BODY="$(curl_https_body "https://${API_HOSTNAME}/health")"

                 MATCH=1
                 if [ "${INFRA_CODE}" != "200" ]; then MATCH=0; fi

                 if docker ps --format '{{.Names}}' | grep -qE '^api-(blue|green)$'; then
                   # API container running → active mode expected.
                   if [ "${HEALTH_CODE}" != "200" ] || echo "${HEALTH_BODY}" | grep -q 'maintenance'; then
                     MATCH=0
                   fi
                 else
                   # No API container → maintenance mode expected.
                   if [ "${HEALTH_CODE}" != "503" ] || ! echo "${HEALTH_BODY}" | grep -q 'maintenance'; then
                     MATCH=0
                   fi
                 fi

                 if [ "${MATCH}" -eq 1 ]; then
                   echo "[deploy] System state intrinsically valid at iteration ${i}."
                   return 0
                 fi

                 echo "[deploy] Mismatch observed on iteration ${i} (INFRA=${INFRA_CODE}, HEALTH=${HEALTH_CODE}). Sleeping 2s..."
                 sleep 2
              done
              return 1
            }

            if ! validate_state; then
              echo "[deploy] ERROR: Controller hit limit. Enforcing Auto-Recovery..."
              bash scripts/nginx-sync.sh || true

              if ! validate_state; then
                echo "[deploy] FATAL: System explicitly failed all convergence paths. Aborting."
                exit 1
              fi
            fi

            echo "[deploy] Final runtime validation complete."
            echo "[deploy] Done."
