# ============================================================================
# FieldTrack API — Production Nginx Reverse Proxy (HARDENED FINAL)
# ============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=api_rate:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=api_health:10m rate=5r/s;

# Cloudflare IPs (unchanged)
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# =========================
# HTTP (PORT 80)
# =========================
server {
    listen 80;
    listen [::]:80;
    server_name __API_HOSTNAME__;

    # MUST be first — exact match (=) always wins over prefix/regex in nginx,
    # but placing it first makes the intent unambiguous and removes any
    # dependency on evaluation order.
    location = /infra/health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 200 '{"status":"ok","component":"nginx"}';
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect API health to HTTPS (correct behavior)
    location = /health {
        return 301 https://$host$request_uri;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# HTTPS (PORT 443)
# =========================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name __API_HOSTNAME__;

    ssl_certificate     /etc/ssl/api/origin.crt;
    ssl_certificate_key /etc/ssl/api/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    # Gzip compression — replaces @fastify/compress which has a Node 24+
    # incompatibility (peek-stream/stream-shift bug).  Nginx is the right
    # place for this anyway: it compresses at the edge, closer to the client.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    set $api_backend "http://__ACTIVE_CONTAINER__:3000";

    # safer guard (kept minimal)
    if ($host !~* ^(__API_HOSTNAME__|localhost|127\.0\.0\.1)$) {
        return 444;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log;

    # =========================
    # INFRA HEALTH (CRITICAL)
    # =========================
    location = /infra/health {
        access_log off;
        default_type application/json;
        charset utf-8;
        return 200 '{"status":"ok","component":"nginx"}';
    }

    # =========================
    # API HEALTH (PROXIED)
    # =========================
    location = /health {
        limit_req zone=api_health burst=10 nodelay;
        proxy_pass $api_backend$request_uri;
        proxy_buffering off;
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================
    # READY (INTERNAL)
    # =========================
    # allow 127.0.0.1        — direct loopback inside the container
    # allow 172.17.0.0/16    — Docker default bridge network (docker0).
    #                          The host connects to 127.0.0.1:443 but Docker
    #                          rewrites the source to the bridge gateway
    #                          (172.17.0.1), so nginx never sees 127.0.0.1
    #                          from host callers.
    #                          172.17.0.0/16 is the default bridge; if a custom
    #                          network uses a different subnet set
    #                          DOCKER_BRIDGE_SUBNET in the environment and
    #                          re-render this config.  This range is not
    #                          routable from the internet and cannot be spoofed
    #                          via Cloudflare (real_ip already unwraps
    #                          CF-Connecting-IP before allow/deny).
    location = /ready {
        allow 127.0.0.1;
        allow 172.17.0.0/16;
        deny all;

        proxy_pass $api_backend$request_uri;
        proxy_buffering off;
    }

    # =========================
    # SSE EVENTS (EXTENDED TIMEOUT)
    # =========================
    # Admin real-time event stream — heartbeat every 30s.
    # Extended proxy_read_timeout prevents nginx from closing the connection
    # between heartbeats.
    location = /admin/events {
        limit_req zone=api_rate burst=10 nodelay;

        proxy_pass $api_backend$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        # SSE-specific: disable buffering and extend timeout for long-lived connections
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }

    # =========================
    # MAIN API
    # =========================
    location / {
        limit_req zone=api_rate burst=50 nodelay;

        proxy_pass $api_backend$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}