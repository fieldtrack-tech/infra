# ============================================================================
# FieldTrack API — Bootstrap / Maintenance Nginx Config
# ============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Cloudflare IPs
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

geo $realip_remote_addr $is_trusted_source {
    default          0;
    127.0.0.1/32     1;
    ::1/128          1;
    103.21.244.0/22  1;
    103.22.200.0/22  1;
    103.31.4.0/22    1;
    104.16.0.0/13    1;
    104.24.0.0/14    1;
    108.162.192.0/18 1;
    131.0.72.0/22    1;
    141.101.64.0/18  1;
    162.158.0.0/15   1;
    172.64.0.0/13    1;
    173.245.48.0/20  1;
    188.114.96.0/20  1;
    190.93.240.0/20  1;
    197.234.240.0/22 1;
    198.41.128.0/17  1;
}

server {
    listen 80;
    listen [::]:80;
    server_name __API_HOSTNAME__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 200 '{"status":"ok","mode":"maintenance"}';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name __API_HOSTNAME__;

    ssl_certificate     /etc/ssl/api/origin.crt;
    ssl_certificate_key /etc/ssl/api/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    if ($host !~* ^(__API_HOSTNAME__|localhost|127\.0\.0\.1)$) {
        return 444;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log;

    location = /health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 200 '{"status":"ok","mode":"maintenance"}';
    }

    location = /ready {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"unavailable","reason":"backend-not-configured"}';
    }

    location /monitor/ {
        if ($is_trusted_source = 0) { return 403; }
        set $grafana_upstream "http://grafana:3000";
        proxy_pass $grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }

    location = /monitor {
        return 301 $scheme://$host/monitor/;
    }

    location / {
        add_header Content-Type 'application/json; charset=utf-8' always;
        add_header Retry-After 30 always;
        return 503 '{"status":"unavailable","reason":"backend-not-ready"}';
    }
}
