server {
    listen 80;
    server_name __API_HOSTNAME__;

    # MUST be first — see comment in api.conf HTTP block.
    location = /infra/health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 200 '{"status":"ok","component":"nginx"}';
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance","reason":"no-healthy-backend"}';
    }

    location = /ready {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance"}';
    }

    location /monitor {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance"}';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name __API_HOSTNAME__;

    ssl_certificate     /etc/ssl/api/origin.crt;
    ssl_certificate_key /etc/ssl/api/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /infra/health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 200 '{"status":"ok","component":"nginx"}';
    }

    location = /health {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance","reason":"no-healthy-backend"}';
    }

    location = /ready {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance"}';
    }

    location /monitor {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance"}';
    }

    location / {
        access_log off;
        add_header Content-Type 'application/json; charset=utf-8' always;
        return 503 '{"status":"maintenance"}';
    }
}
